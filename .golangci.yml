version: "2"

run:
  timeout: 5m

linters:
  # The default set (errcheck, govet, ineffassign, staticcheck, unused) stays on;
  # these add reasonable extra coverage without excessive noise.
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - nakedret
    - revive
    - unconvert
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    rules:
      # Test files may ignore errors and use looser conventions.
      - path: _test\.go
        linters:
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
